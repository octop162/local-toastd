name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag to start with 'v', got: $tag"
          }

          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify tag matches project version
        shell: pwsh
        run: |
          $projectVersion = @'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          '@ | python -

          $projectVersion = $projectVersion.Trim()
          $tagVersion = "${{ steps.version.outputs.version }}"

          if ($projectVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match pyproject version '$projectVersion'."
          }

      - name: Build release package
        shell: pwsh
        run: .\scripts\release.ps1 -Version ${{ steps.version.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: build/release/local-toastd-${{ steps.version.outputs.version }}-win64.zip
